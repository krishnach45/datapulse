# DataPulse - GitHub Actions CI/CD Pipeline
# Stages: lint → unit tests → SonarQube → docker build → deploy to AKS

name: DataPulse CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  IMAGE_NAME: datapulse-api
  AKS_RESOURCE_GROUP: datapulse-rg
  AKS_CLUSTER_NAME: datapulse-aks
  NAMESPACE: datapulse

jobs:

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linting tools
        run: pip install ruff black isort
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Black format check
        run: black --check .
      - name: isort check
        run: isort --check-only .

  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install pytest pytest-cov pytest-html kafka-python azure-cosmos httpx fastapi uvicorn
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=reports/unit-results.xml \
            -v
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/unit-results.xml

  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=krishnach45_datapulse
            -Dsonar.projectName=DataPulse
            -Dsonar.organization=krishnach45
            -Dsonar.sources=.
            -Dsonar.exclusions=**/tests/**,**/__pycache__/**,**/htmlcov/**
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=false

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Log in to ACR
        run: az acr login --name ${{ env.REGISTRY }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: docker-build
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
      - name: Deploy to AKS
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE_TAG}|g" infra/k8s/deployment.yaml
          kubectl apply -f infra/k8s/deployment.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f infra/k8s/service.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f infra/k8s/hpa.yaml -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/datapulse-api -n ${{ env.NAMESPACE }} --timeout=5m
