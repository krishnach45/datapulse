# DataPulse - SonarQube Project Configuration
sonar.projectKey=datapulse
sonar.projectName=DataPulse
sonar.projectVersion=1.0.0

# Source paths
sonar.sources=ingestion,spark_jobs,api
sonar.tests=tests

# Exclusions
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/htmlcov/**,\
  **/.github/**,\
  **/infra/**,\
  **/grafana/**,\
  **/config/**,\
  **/*.json

# Python settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Quality Gate rules (enforced in CI pipeline)
# - Coverage >= 80%
# - 0 critical/blocker bugs
# - Duplicated lines < 3%
# - Maintainability rating >= A
