# ── Horizontal Pod Autoscaler ─────────────────────────────────────────────────
# Scales datapulse-api pods between 2-10 replicas based on CPU utilisation.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datapulse-api-hpa
  namespace: datapulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datapulse-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5-min cool-down before scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
